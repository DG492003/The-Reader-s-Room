<header class="app-nav">
  <div class="nav-inner">

    <!-- Brand -->
    <a routerLink="/books" class="nav-brand" aria-label="The Reader Room home">
      <svg class="app-logo" width="38" height="27" viewBox="0 0 100 70" fill="none" xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true">
        <path d="M50 42 C50 42 18 38 14 14 C10 -4 36 2 50 18 Z" fill="#3B5998" opacity="0.9" />
        <path d="M50 42 C50 42 82 38 86 14 C90 -4 64 2 50 18 Z" fill="#4A7C59" opacity="0.9" />
        <path d="M50 42 C50 42 18 38 10 58 C8 64 30 68 50 54 Z" fill="#3B5998" opacity="0.55" />
        <path d="M50 42 C50 42 82 38 90 58 C92 64 70 68 50 54 Z" fill="#4A7C59" opacity="0.55" />
        <path d="M50 42 C50 42 34 40 26 50 C20 58 32 62 50 54 Z" fill="#3B6B70" opacity="0.5" />
        <path d="M50 42 C50 42 66 40 74 50 C80 58 68 62 50 54 Z" fill="#3B6B70" opacity="0.5" />
      </svg>
      <span class="nav-brand-name">The Reader Room</span>
    </a>

    <!-- Nav links -->
    <nav class="nav-links" aria-label="Main navigation">
      <a routerLink="/books" routerLinkActive="nav-link--active" [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link">
        <i class="ti ti-compass" aria-hidden="true"></i> Discover
      </a>
      <a routerLink="my-books" routerLinkActive="nav-link--active" class="nav-link">
        <i class="ti ti-book" aria-hidden="true"></i> My Books
      </a>
      <a routerLink="my-waiting-list" routerLinkActive="nav-link--active" class="nav-link">
        <i class="ti ti-heart" aria-hidden="true"></i> Waiting List
      </a>
      <a routerLink="my-borrowed-books" routerLinkActive="nav-link--active" class="nav-link">
        <i class="ti ti-list-check" aria-hidden="true"></i> Borrowed
      </a>
      <a routerLink="my-returned-books" routerLinkActive="nav-link--active" class="nav-link">
        <i class="ti ti-rotate-left" aria-hidden="true"></i> Returned
      </a>
    </nav>

    <!-- User area -->
    <div class="nav-user">
      <div class="user-chip">
        <span class="user-chip__avatar">{{ connectedUsername.charAt(0).toUpperCase() }}</span>
        <span class="user-chip__name">{{ connectedUsername }}</span>
      </div>
      <button class="nav-logout" (click)="logout()" title="Sign out">
        <i class="ti ti-logout"></i>
        <span>Sign out</span>
      </button>
    </div>

  </div>
</header>
