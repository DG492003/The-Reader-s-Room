@if (submitted) {
<div class="container">
    @if (isOkay) {
    <div class="activation-message">
        <h2>Activation Successful!</h2>
        <p>Your account has been successfully activated.</p>
        <button class="btn btn-primary" (click)="redirectToLogin()">Go to Login</button>
    </div>
    } @else {
    <div class="activation-error">
        <h2>Activation Failed!</h2>
        <p>{{ message }}</p>
        <button class="btn btn-primary" (click)="submitted = false">Try again</button>
    </div>
    }
</div>
} @else {
<div class="container">
    <div class="text-center" style="width: 400px;">
        <h2>Type your activation code</h2>
        <input type="text" class="form-control text-center" maxlength="6" placeholder="Enter OTP" [(ngModel)]="otp"
            (keyup.enter)="onCodeCompleted(otp)" />
        <button class="btn btn-primary mt-3" (click)="onCodeCompleted(otp)">Verify</button>
        <button class="btn btn-outline-secondary mt-3 ms-2" (click)="redirectToLogin()">Go to Login</button>
    </div>
</div>
}
